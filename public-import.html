<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="4; url=./board.html#publicImportPanel">
  <title>Maintainer Flowboard — Public import moved</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--ink:#102033;--muted:#64748b;--line:rgba(16,32,51,.12);--blue:#2563eb;--blueSoft:#dbeafe;--shadow:0 10px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{min-height:100vh;max-width:760px;margin:0 auto;padding:20px;display:grid;place-items:center}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:24px;display:grid;gap:14px}.eyebrow{display:inline-flex;width:max-content;padding:7px 10px;border-radius:999px;background:var(--blueSoft);color:#1e3a8a;font-size:13px;font-weight:850}h1{margin:0;font-size:clamp(30px,5vw,48px);line-height:1.04;letter-spacing:-.04em}p{margin:0;color:var(--muted);line-height:1.55}.btn{min-height:42px;border:1px solid transparent;border-radius:12px;background:var(--blue);padding:0 14px;font-weight:850;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;width:max-content}
  </style>
</head>
<body>
  <main class="app">
    <section class="card" aria-labelledby="movedTitle">
      <div class="eyebrow">Public GitHub import</div>
      <h1 id="movedTitle">Public GitHub import now lives on the main board.</h1>
      <p>The old helper workflow has been retired. Use the main board to import public issues and pull requests in one step.</p>
      <p>You will be redirected shortly.</p>
      <a class="btn" href="./board.html#publicImportPanel">Go to the main board import</a>
    </section>
  </main>
</body>
</html>
