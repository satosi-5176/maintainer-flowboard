<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maintainer Flowboard — Public Repository Selector</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--ink:#102033;--muted:#64748b;--line:rgba(16,32,51,.12);--blue:#2563eb;--blueSoft:#dbeafe;--shadow:0 10px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:980px;margin:0 auto;padding:20px;display:grid;gap:16px}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px;display:grid;gap:12px}.eyebrow{display:inline-flex;width:max-content;padding:7px 10px;border-radius:999px;background:var(--blueSoft);color:#1e3a8a;font-size:13px;font-weight:850}h1{margin:0;font-size:clamp(32px,5vw,52px);line-height:1.03;letter-spacing:-.04em}p{margin:0;color:var(--muted);line-height:1.55}label{font-weight:850;font-size:13px;color:var(--muted)}input{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;color:var(--ink);font:inherit}.row{display:grid;grid-template-columns:minmax(0,1fr) 150px;gap:10px}.btn{min-height:42px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:0 14px;font-weight:850;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:inherit;text-decoration:none}.primary{background:var(--blue);color:white;border-color:transparent}.status{padding:12px;border:1px solid var(--line);border-radius:12px;background:#f8fafc;white-space:pre-wrap;color:var(--muted)}.danger{color:#991b1b}.ok{color:#166534}.repo-tools{display:none}.repo-list{display:grid;gap:10px}.repo{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;display:grid;gap:8px}.repo h3{margin:0;font-size:16px}.repo[aria-selected="true"]{outline:3px solid rgba(37,99,235,.28);border-color:rgba(37,99,235,.45)}.meta{font-size:13px;color:var(--muted)}.details{display:none;border-top:1px solid var(--line);padding-top:8px}.details.is-open{display:grid;gap:5px}.selected-actions{display:none;border-top:1px solid var(--line);padding-top:10px}.selected-actions.is-open{display:grid;gap:8px}.actions{display:flex;flex-wrap:wrap;gap:10px}.small{font-size:13px}@media(max-width:720px){.app{padding:14px}.row{grid-template-columns:1fr}.actions{display:grid}.btn{width:100%}}
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="eyebrow">Public repository selector</div>
      <h1>Choose a public repository</h1>
      <p>Enter a GitHub user or organization, find public repositories, then choose one. Details are optional; you can go straight to the board or open the repository on GitHub.</p>
    </section>

    <section class="card">
      <label for="ownerInput">GitHub user or organization</label>
      <div class="row">
        <input id="ownerInput" placeholder="satosi-5176" autocomplete="off">
        <button class="btn primary" id="fetchButton" type="button">Find repos</button>
      </div>
      <div id="status" class="status">Enter a public GitHub user or organization, then fetch repositories.</div>
    </section>

    <section class="card repo-tools" id="repoTools">
      <label for="repoSearchInput">Search repositories</label>
      <input id="repoSearchInput" placeholder="Filter by name or description" autocomplete="off">
    </section>

    <section class="card">
      <div id="repoList" class="repo-list"></div>
    </section>
  </main>
<script>
const STORE_KEY="maintainer-flowboard-v0.1";
let repos=[],selectedRepo=null,openDetails=new Set();
const $=id=>document.getElementById(id);
function setStatus(message,kind){const target=$("status");target.textContent=message;target.className="status"+(kind?` ${kind}`:"")}
function esc(value){return String(value??"").replace(/[&<>"']/g,character=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[character]))}
function labelsOf(labels){return Array.isArray(labels)?labels.map(label=>typeof label==="string"?label:label?.name).filter(Boolean):[]}
function daysOld(iso){return Math.floor((Date.now()-new Date(iso||Date.now()).getTime())/86400000)}
function classifyItem(item){const text=[item.title,item.body,(item.labels||[]).join(" ")].join(" ").toLowerCase(),stale=daysOld(item.updatedAt)>=30,validationTask=item.type==="issue"&&/\b(validate|validation|qa|smoke test|manual test|real oss repository|test plan)\b/.test(text),bug=item.type==="issue"&&/\b(bug|crash|error|broken|fail(?:s|ed|ing)?|exception|regression|unstable|incorrect|wrong|hangs?)\b/.test(text),hasRepro=/\b(playground|input|output|expected|reproduce|reproduction|steps)\b|expected output/.test(text),missingRepro=/\b(cannot reproduce|can't reproduce|cant reproduce|could not reproduce|no minimal reproduction|no reproduction|no repro|no reduced test case|no test case|no reliable steps|do not have reliable steps|don't have reliable steps|without (?:a )?(?:minimal |reduced )?(?:reproduction|repro|test case))\b/i.test(text),docs=/\b(docs?|documentation|readme|troubleshooting|guide|question|supported)\b/.test(text),dependency=/\b(dependencies?|renovate|dependabot|dependency dashboard|bot)\b/.test(text),release=/\b(release|tracking|changelog|migration|breaking|deprecation|deprecated)\b/.test(text),feature=/\b(feature request|enhancement|proposal|request)\b/.test(text),waiting=/\b(waiting for author|needs response|author response|please provide)\b/.test(text)||item.draft;if(waiting)return{...item,column:"Waiting for Author Response",reason:item.draft?"Pull request appears to be draft or not ready for review.":"Thread appears to be waiting for the author.",nextAction:"Inspect whether the missing author response is still needed before any follow-up."};if(dependency)return{...item,column:"Dependency / Bot Maintenance",reason:"Dependency or bot-maintained tracking item detected.",nextAction:"Inspect dependency update status and project bot policy."};if(release)return{...item,column:"Tracking / Release Follow-up",reason:"Tracking or release follow-up item detected.",nextAction:"Inspect release state, linked PRs, and remaining follow-up notes."};if(feature)return{...item,column:"Feature / Request",reason:"Feature or request-like item detected.",nextAction:"Inspect whether this request fits project scope and maintenance cost."};if(validationTask)return{...item,column:"Ready for Maintainer Review",reason:"Validation or QA task detected.",nextAction:"Inspect validation scope, target repository, expected evidence, and recorded results."};if(item.type==="issue"&&bug&&missingRepro)return{...item,column:"Needs Reproduction",reason:"Bug-like report says reproduction is missing or unreliable.",nextAction:stale?"Inspect missing reproduction details and also check whether the age/relevance still justifies follow-up.":"Inspect what reproduction, environment, expected behavior, or actual behavior is missing."};if(item.type==="issue"&&bug&&hasRepro)return{...item,column:"Ready for Maintainer Review",reason:"Issue appears to include bug-like wording and reproduction or actionability details.",nextAction:"Inspect reproduction, expected behavior, actual behavior, and affected scope."};if(item.type==="issue"&&bug)return{...item,column:"Needs Reproduction",reason:"Bug-like report without clear reproduction details.",nextAction:stale?"Inspect missing reproduction details and also check whether the age/relevance still justifies follow-up.":"Inspect what reproduction, environment, expected behavior, or actual behavior is missing."};if(item.type==="pr"&&/\b(tests?|validation|checklist|lint|typecheck|build)\b/.test(text))return{...item,column:"Ready for Maintainer Review",reason:"Non-draft PR mentions tests or validation.",nextAction:"Inspect scope, test coverage, and risk before maintainer judgment."};if(docs)return{...item,column:"Docs Candidate",reason:item.type==="pr"?"Pull request appears to involve documentation or docs-only work.":"Labels or text suggest documentation work.",nextAction:"Inspect whether this is a docs gap, question, or docs-change candidate."};if(stale)return{...item,column:"Stale Candidate",reason:"No recent activity for 30+ days.",nextAction:"Inspect whether the item is still relevant before any further action."};return{...item,column:"Unclassified",reason:"Imported from public GitHub and no strong rule matched.",nextAction:"Inspect manually and assign a category."}}
function normalizeItem(item){const isPR=!!item.pull_request;return{number:item.number,title:item.title||"(untitled)",type:isPR?"pr":"issue",labels:labelsOf(item.labels),author:item.user?.login||"unknown",updatedAt:item.updated_at||new Date().toISOString(),body:item.body||"",comments:[],draft:/^\s*draft\b|^\s*draft:/i.test(item.title||""),htmlUrl:item.html_url||""}}
async function fetchJson(url){const response=await fetch(url,{headers:{"Accept":"application/vnd.github+json"}});if(!response.ok){const detail=await response.text().catch(()=>"");throw new Error(`GitHub request failed: ${response.status} ${response.statusText}${detail?`\n${detail.slice(0,220)}`:""}`)}return response.json()}
function renderRepos(){const query=$("repoSearchInput").value.trim().toLowerCase(),filtered=repos.filter(repo=>[repo.full_name,repo.name,repo.description,repo.language].join(" ").toLowerCase().includes(query));$("repoList").innerHTML=filtered.map(repo=>{const selected=selectedRepo?.full_name===repo.full_name,detailsOpen=openDetails.has(repo.full_name);return `<article class="repo" aria-selected="${selected}"><h3>${esc(repo.full_name)}</h3><div class="meta">${esc(repo.description||"No description")}</div><div class="meta">Updated ${esc((repo.updated_at||"").slice(0,10))} · Open issues ${Number(repo.open_issues_count||0)}</div><div class="actions"><button class="btn ${selected?"":"primary"}" type="button" data-select="${esc(repo.full_name)}">${selected?"Selected":"Select repo"}</button><button class="btn" type="button" data-details="${esc(repo.full_name)}">${detailsOpen?"Hide details":"Details"}</button></div><div class="details ${detailsOpen?"is-open":""}" id="details-${repo.id}"><div class="meta">Language: ${esc(repo.language||"Unknown")}</div><div class="meta">Stars: ${Number(repo.stargazers_count||0)} · Forks: ${Number(repo.forks_count||0)}</div><div class="meta">Default branch: ${esc(repo.default_branch||"default")}</div><div class="meta">GitHub: ${esc(repo.html_url)}</div></div><div class="selected-actions ${selected?"is-open":""}"><div class="actions"><button class="btn primary" type="button" data-open-board="${esc(repo.full_name)}">Open board</button><a class="btn" href="${esc(repo.html_url)}" target="_blank" rel="noreferrer">Open on GitHub</a></div><p class="small">Open board imports public issues and PRs into local board data, then opens Maintainer Flowboard.</p></div></article>`}).join("")||"<p>No matching repositories.</p>";document.querySelectorAll("[data-select]").forEach(button=>button.onclick=()=>selectRepo(button.dataset.select));document.querySelectorAll("[data-details]").forEach(button=>button.onclick=()=>toggleDetails(button.dataset.details));document.querySelectorAll("[data-open-board]").forEach(button=>button.onclick=()=>openBoard(button.dataset.openBoard,button))}
function toggleDetails(fullName){if(openDetails.has(fullName))openDetails.delete(fullName);else openDetails.add(fullName);renderRepos()}
function selectRepo(fullName){selectedRepo=repos.find(candidate=>candidate.full_name===fullName);if(!selectedRepo)return;renderRepos();setStatus(`Selected ${selectedRepo.full_name}. Open it in the board or inspect details in the same card.`,"ok")}
async function fetchRepos(){const owner=$("ownerInput").value.trim();if(!owner){setStatus("Enter a GitHub user or organization first.","danger");return}selectedRepo=null;openDetails.clear();$("fetchButton").disabled=true;$("repoList").innerHTML="";setStatus(`Fetching public repositories for ${owner}...`);try{repos=await fetchJson(`https://api.github.com/users/${encodeURIComponent(owner)}/repos?type=owner&sort=updated&per_page=100`);if(!repos.length){setStatus(`No public repositories found for ${owner}.`,"danger");return}$("repoTools").style.display="grid";$("repoSearchInput").value="";renderRepos();setStatus(`Found ${repos.length} public repositories for ${owner}. Select one, or use Details first.`,"ok")}catch(error){repos=[];setStatus(error.message,"danger")}finally{$("fetchButton").disabled=false}}
async function openBoard(fullName,button){const repo=repos.find(candidate=>candidate.full_name===fullName);if(!repo)return;button.disabled=true;setStatus(`Importing ${repo.full_name} into the board...`);try{const raw=await fetchJson(`https://api.github.com/repos/${encodeURIComponent(repo.full_name).replace("%2F","/")}/issues?state=open&per_page=50&sort=updated&direction=desc`),items=raw.map(normalizeItem).map(classifyItem),state={repoName:repo.full_name,maintainerNote:`Imported from public GitHub repository ${repo.full_name}.`,items};localStorage.setItem(STORE_KEY,JSON.stringify(state));location.href="./index.html"}catch(error){setStatus(error.message,"danger")}finally{button.disabled=false}}
$("fetchButton").onclick=fetchRepos;
$("ownerInput").addEventListener("keydown",event=>{if(event.key==="Enter")fetchRepos()});
$("repoSearchInput").addEventListener("input",renderRepos);
</script>
</body>
</html>
