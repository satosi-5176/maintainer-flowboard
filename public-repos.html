<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./index.html">
  <title>Maintainer Flowboard — Repository Selector</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--ink:#102033;--muted:#64748b;--line:rgba(16,32,51,.12);--blue:#2563eb;--blueSoft:#dbeafe;--shadow:0 10px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;padding:20px}.card{width:min(100%,680px);background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:22px;display:grid;gap:12px}.eyebrow{display:inline-flex;width:max-content;padding:7px 10px;border-radius:999px;background:var(--blueSoft);color:#1e3a8a;font-size:13px;font-weight:850}h1{margin:0;font-size:clamp(30px,5vw,46px);line-height:1.04;letter-spacing:-.04em}p{margin:0;color:var(--muted);line-height:1.55}.btn{min-height:42px;border:1px solid transparent;border-radius:12px;background:var(--blue);color:white;padding:0 14px;font-weight:850;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;width:max-content}
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Compatibility path</div>
    <h1>Maintainer Flowboard moved home</h1>
    <p>The public repository selector is now the Maintainer Flowboard home page. You should be redirected automatically.</p>
    <a class="btn" href="./index.html">Open Maintainer Flowboard</a>
  </main>
  <script>location.replace("./index.html");</script>
</body>
</html>
